  loss_mix: 0.5
  model:  simple_mnist_conv #mnist_conv_gemini # mnist_vit #
  model_io: !!python/tuple
  - 8
  - 1
  model_size: !!python/tuple
  - 8
  - 1
  momentum: 0.5
  n_models: 1
  seed: 100
  vocabulary_size: 20001
