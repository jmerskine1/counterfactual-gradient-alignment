data_params:
  boundary_only: false
  dataset: integer_len32
  knowledge_func: counterfactual
  max_delta: 1.0
  n_vec: 2
  train_size: 20
  validation_size: 100
  control: False
  active_sampling: True
  init_samplesize: 200
  sample_size: 20
  diversity: 0.8
hyperparams:
  batch_size: 8
  embedding_size: 32
  epochs: 5
  learning_rate: 0.0001 #0.0001
  loss_function: multiclass_split_loss_embedding_sign
  loss_mix: 0.7
  model:  multiclass_bag_of_words #mnist_conv_gemini # mnist_vit #
  model_io: !!python/tuple
  - 8
  - 1
  model_size: !!python/tuple
  - 8
  - 1
  momentum: 0.5
  n_models: 1
  seed: 100
  vocabulary_size: 20001
visualisation:
  draw_eval: true
  plot_epoch: false
  video: false
  visualise: false
  visualise_embeddings: false
